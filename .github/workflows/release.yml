name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-pyapp:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: proxhy-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: proxhy-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: proxhy-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Build proxhy wheel
        run: uv build --wheel

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Download pyapp source
        shell: bash
        run: |
          curl -fsSL https://github.com/ofek/pyapp/releases/latest/download/source.tar.gz \
            | tar -xz
          mv pyapp-* pyapp-src

      - name: Copy wheel into pyapp source
        shell: bash
        run: cp dist/proxhy-*.whl pyapp-src/

      - name: Get wheel filename
        id: wheel
        shell: bash
        run: echo "path=$(ls dist/proxhy-*.whl | head -1 | xargs basename)" >> $GITHUB_OUTPUT

      - name: Build pyapp
        shell: bash
        working-directory: pyapp-src
        env:
          PYAPP_PROJECT_PATH: ${{ steps.wheel.outputs.path }}
          PYAPP_EXEC_SPEC: proxhy.main:main
          PYAPP_PYTHON_VERSION: "3.14"
          PYAPP_PIP_EXTRA_ARGS: "--extra-index-url https://kbidlack.github.io/proxhy/simple/"
          PYAPP_EXPOSE_ALL_COMMANDS: 1
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp pyapp-src/target/${{ matrix.target }}/release/pyapp ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp pyapp-src/target/${{ matrix.target }}/release/pyapp.exe ${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ runner.os == 'Windows' && '.exe' || '' }}

  # ── Publish wheel to GitHub Pages index ─────────────────────────
  publish-index:
    needs: build-pyapp
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Build wheel
        run: uv build --wheel
      - name: Generate simple index
        run: |
          mkdir -p pages/simple/proxhy
          cp dist/proxhy-*.whl pages/simple/proxhy/
          echo "<html><body>" > pages/simple/proxhy/index.html
          for f in pages/simple/proxhy/*.whl; do
            name=$(basename "$f")
            echo "<a href=\"$name\">$name</a><br>" >> pages/simple/proxhy/index.html
          done
          echo "</body></html>" >> pages/simple/proxhy/index.html
          echo "<html><body><a href=\"proxhy/\">proxhy</a></body></html>" \
            > pages/simple/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      - uses: actions/deploy-pages@v4

  # ── Create GitHub Release ────────────────────────────────────────
  release:
    needs: build-pyapp
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Get version without v prefix
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: |
            proxhy-macos
            proxhy-linux
            proxhy-windows.exe
